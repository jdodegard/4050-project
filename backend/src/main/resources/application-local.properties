# Local dev profile: file-based H2 instead of the MySQL container, so you can
# just run the app with zero setup. Start with:
#   SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run
spring.datasource.url=jdbc:h2:file:./data/cesdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# browse the DB at http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:file:./data/cesdb  user: sa  no password)
spring.h2.console.enabled=true

spring.application.name=backend
spring.datasource.url=jdbc:mysql://mysql:3306/cinema?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=cinema
spring.datasource.password=cinema123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# where the emailed links (activate / reset password) point
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# AES key for encrypting stored card numbers - override with the CARD_KEY
# env var outside of local dev
app.card-key=${CARD_KEY:ces-dev-key-2026}

# SMTP for confirmation/reset/notification emails. If MAIL_USERNAME is unset,
# emails get printed to the console instead of sent (handy for local dev).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

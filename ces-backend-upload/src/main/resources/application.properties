spring.application.name=ces-backend
server.port=8080

# =====================================================================
# DEFAULT: H2 database (zero setup, runs instantly, file-based so data
# persists between restarts). Great for development and the TA demo.
# =====================================================================
spring.datasource.url=jdbc:h2:file:./data/cesdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Browse the DB in a browser at http://localhost:8080/h2-console
# (JDBC URL: jdbc:h2:file:./data/cesdb  user: sa  no password)
spring.h2.console.enabled=true

# =====================================================================
# TO SWITCH TO MySQL: comment out the H2 block above, uncomment below,
# and create the database first:  CREATE DATABASE ces;
# =====================================================================
